name: test

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        # Dependabot PRs update package versions so the lockfile legitimately changes.
        # The dependabot-lockfile workflow commits the updated lockfile separately, but
        # it runs in parallel with this job — we cannot depend on its commit being present
        # here. Use plain `bun install` for Dependabot PRs so we install correct versions;
        # keep --frozen-lockfile for all other runs to catch accidental lockfile drift.
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ github.event.pull_request.user.login }}" = "dependabot[bot]" ]; then
            bun install
          else
            bun install --frozen-lockfile
          fi

      - name: Check format
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test
